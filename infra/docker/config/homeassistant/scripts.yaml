chill_mode:
  alias: Chill Mode
  icon: mdi:snowflake
  mode: single
  sequence:
    # Optional: keep your "mode" state
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.chill_mode

    # Chill lighting intent
    - service: light.turn_on
      target:
        entity_id: light.living_room_floor_light

    - service: light.turn_off
      target:
        entity_id:
          - light.living_room_light
          - light.living_room_atrium_light
          - light.kitchen_light

    # Cancel cook mode
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.cook_mode

reset_adaptive_lighting_bathroom:
  alias: Reset Adaptive Lighting – Bathroom
  mode: single
  sequence:
    - service: switch.turn_on
      target:
        entity_id:
          - switch.adaptive_lighting_bathroom
          - switch.adaptive_lighting_adapt_brightness_bathroom
          - switch.adaptive_lighting_adapt_color_bathroom
    - service: adaptive_lighting.apply
      target:
        entity_id: switch.adaptive_lighting_bathroom

