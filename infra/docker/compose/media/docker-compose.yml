services:
  plex:
    container_name: plex
    image: lscr.io/linuxserver/plex:latest
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - VERSION=docker
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - /home/commander-shepard/plex-config:/config
      - /home/commander-shepard/media:/media
      - /home/commander-shepard/plex-transcode:/transcode
      - /home/commander-shepard/plex-transcode:/run/plex-temp
    restart: unless-stopped
    runtime: nvidia

  qbittorrent:
    container_name: qbittorrent
    image: lscr.io/linuxserver/qbittorrent:latest
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - WEBUI_PORT=8080
    volumes:
      - /home/commander-shepard/nrt/torrents:/torrents
      - /home/commander-shepard/nrt/incomplete-torrents:/incomplete-torrents
      - /home/commander-shepard/vr/vr-films:/vr/vr-films
      - /home/commander-shepard/professional/vr-films-2:/vr/vr-films-2
      - /home/commander-shepard/media:/media
      - /home/commander-shepard/qbittorrent-config:/config
      - /home/commander-shepard/professional:/professional
    restart: unless-stopped

  radarr:
    container_name: radarr
    image: lscr.io/linuxserver/radarr:latest
    ports:
      - "7878:7878"
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
    volumes:
      - /home/commander-shepard/media/movies:/movies
      - /home/commander-shepard/nrt/torrents:/torrents
      - /home/commander-shepard/radarr-config:/config
    restart: unless-stopped

  sonarr:
    container_name: sonarr
    image: lscr.io/linuxserver/sonarr:latest
    ports:
      - "8989:8989"
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
    volumes:
      - /home/commander-shepard/media/animated-series:/animated-series
      - /home/commander-shepard/media/series:/series
      - /home/commander-shepard/nrt/torrents:/torrents
      - /home/commander-shepard/sonarr-config:/config
    restart: unless-stopped

  prowlarr:
    container_name: prowlarr
    image: lscr.io/linuxserver/prowlarr:latest
    ports:
      - "9696:9696"
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
    volumes:
      - /home/commander-shepard/prowlarr-config:/config
    restart: unless-stopped

  flaresolverr:
    container_name: flaresolverr
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - CAPTCHA_SOLVER=none
    ports:
      - "8191:8191"