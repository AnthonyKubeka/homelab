name: Deploy Media

on:
  push:
    branches:
      - main
    paths:
      - 'infra/docker/compose/media/**'
      - '.forgejo/workflows/deploy-media.yml'

env:
  REPO_ROOT: /home/commander-shepard/homelab

jobs:
  deploy:
    runs-on: normandy
    steps:
      - name: Update repo
        run: |
          cd $REPO_ROOT
          git fetch origin
          git reset --hard origin/main

      - name: Deploy media stack
        run: $REPO_ROOT/infra/scripts/deploy-stack.sh media
