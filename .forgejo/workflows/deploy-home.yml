name: Deploy Home

on:
  push:
    branches:
      - main
    paths:
      - 'infra/docker/compose/home/**'
      - 'infra/docker/config/homeassistant/**'
      - '.forgejo/workflows/deploy-home.yml'

env:
  REPO_ROOT: /home/commander-shepard/homelab

jobs:
  deploy:
    runs-on: normandy
    steps:
      - name: Update repo
        run: |
          cd $REPO_ROOT
          git fetch origin
          git reset --hard origin/main

      - name: Sync Home Assistant config
        run: |
          mkdir -p /home/commander-shepard/homeassistant/config
          rsync -av \
            --exclude 'secrets.yaml' \
            $REPO_ROOT/infra/docker/config/homeassistant/ \
            /home/commander-shepard/homeassistant/config/

      - name: Deploy home stack
        run: $REPO_ROOT/infra/scripts/deploy-stack.sh home
